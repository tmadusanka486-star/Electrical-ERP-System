<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - T&S PowerTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f111a; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Background Effects */
        .bg-circle-1 { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, transparent 70%); top: -100px; left: -100px; border-radius: 50%; }
        .bg-circle-2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(58, 123, 213, 0.1) 0%, transparent 70%); bottom: -150px; right: -150px; border-radius: 50%; }

        .login-card {
            background: #1e2130;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .brand-logo { text-align: center; margin-bottom: 30px; }
        .brand-logo h2 { color: #ffffff; font-weight: 700; font-size: 26px; letter-spacing: 1px; margin: 0; }
        .brand-logo p { color: #8b92a5; font-size: 13px; margin-top: 5px; }

        .form-control {
            background: #151824;
            border: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            background: #151824;
            border-color: #00d2ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }
        
        .form-label { color: #8b92a5; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        .btn-login {
            background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 15px;
            transition: 0.3s;
            margin-top: 15px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); color: white;}

        .alert-error { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>

    <div class="login-card">
        <div class="brand-logo">
            <div style="font-size: 40px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(0,210,255,0.5);">⚡</div>
            <h2>T&S PowerTech</h2>
            <p>ERP System Login</p>
        </div>

        {% if error %}
        <div class="alert-error">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-login">Login to System</button>
        </form>

        <div class="text-center mt-4">
            <p style="font-size: 11px; color: #555;">&copy; 2026 Logic Circuit SL. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
