<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise ERP System - Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 27, 34, 0.65);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255,255,255,0.06);
            --accent-primary: #4f46e5;
            --accent-secondary: #06b6d4;
            --btn-text: #ffffff;
            --focus-ring: rgba(79, 70, 229, 0.25);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0,0,0,0.08);
            --accent-primary: #4338ca;
            --accent-secondary: #0284c7;
            --btn-text: #ffffff;
            --focus-ring: rgba(67, 56, 202, 0.2);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }

        body { 
            background: var(--bg-color); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        /* Abstract Modern Background */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: pulse-shape 15s infinite alternate ease-in-out;
        }

        [data-theme="light"] .bg-shape {
            opacity: 0.25;
            filter: blur(60px);
        }

        .shape-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--accent-primary), transparent);
            top: -200px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--accent-secondary), transparent);
            bottom: -150px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes pulse-shape {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(30px, 20px); }
            100% { transform: scale(0.9) translate(-20px, -30px); }
        }

        /* Particles Overlay */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            opacity: 0.5;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        [data-theme="light"] .login-card {
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-toggle-wrapper {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 20;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--input-bg);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px auto;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
            position: relative;
            overflow: hidden;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .brand-section h2 { 
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 28px; 
            letter-spacing: -0.5px; 
            margin: 0 0 8px 0; 
        }

        .brand-section p { 
            color: var(--text-muted); 
            font-size: 15px; 
            margin: 0; 
            font-weight: 400;
        }

        .input-group-custom {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label { 
            display: block;
            color: var(--text-main); 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-icon {
            position: absolute;
            top: 38px;
            left: 18px;
            color: var(--text-muted);
            font-size: 15px;
            transition: color 0.3s;
        }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main) !important;
            padding: 14px 16px 14px 45px;
            border-radius: 14px;
            font-size: 15px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-control:focus {
            background: var(--card-bg);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--focus-ring);
            outline: none;
        }

        .form-control:focus + .input-icon,
        .form-control:not(:placeholder-shown) + .input-icon {
            color: var(--accent-primary);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            color: var(--btn-text);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            padding: 15px;
            border-radius: 14px;
            width: 100%;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.5); 
            color: var(--btn-text);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .alert-error { 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            color: #ef4444; 
            padding: 14px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 500; 
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .footer-text {
            text-align: center;
            margin-top: 35px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Form autocomplete dark mode fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important;
            -webkit-text-fill-color: var(--text-main) !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

    <div class="theme-toggle-wrapper">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="particles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <div class="logo-container">
                    <i class="fas fa-layer-group" style="font-size: 32px; color: white;"></i>
                </div>
                <h2>Enterprise ERP</h2>
                <p>Welcome back! Please enter your details.</p>
            </div>

            {% if error %}
            <div class="alert-error">
                <i class="fas fa-exclamation-circle"></i> <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="input-group-custom">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
                
                <div class="input-group-custom mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <button type="submit" class="btn btn-login">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="footer-text">
                &copy; <script>document.write(new Date().getFullYear())</script> Enterprise ERP Solutions
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const isDark = html.getAttribute('data-theme') === 'dark';
            
            if(isDark) {
                html.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('erp_theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
                localStorage.setItem('erp_theme', 'dark');
            }
        }

        // Initialize Theme from localStorage
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('erp_theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        });
    </script>
</body>
</html>
